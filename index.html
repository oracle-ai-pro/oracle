<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="core.css">
    <title>Core Node 2.5 | Prestige HQ</title>
</head>
<body>

<div id="login-overlay" class="overlay">
    <div class="login-box">
        <div class="oracle-mini" id="main-logo">
            <div class="dot blue"></div>
            <div class="dot purple"></div>
        </div>
        <h2 id="status-text">Вход в Prestige HQ</h2>
        <input type="text" placeholder="ID или Email">
        <input type="password" placeholder="Ключ доступа">
        <button onclick="initPrestige()">Войти в систему</button>
        <button class="secondary-btn">Создать аккаунт</button>
    </div>
</div>

<div class="sidebar" id="sidebar">...</div>
<div class="chat-main" id="main-area">
    <div class="badge" id="context-badge">No Context</div>
    <div id="chat-flow"></div>
    <input type="text" id="main-input" placeholder="Введите команду...">
</div>

<script src="Account.js"></script>
<script>
async function initPrestige() {
    const logo = document.getElementById('main-logo');
    const status = document.getElementById('status-text');
    
    // Анимация подготовки
    status.innerText = "Подготовка аккаунта...";
    logo.classList.add('hyper-pulse');
    
    // Инициализация Prestige
    await PrestigeAccount.initialize();
    
    // Переход в главное окно
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('main-input').classList.add('blink-neon');
    console.log("Core Node 2.5 Online.");
}
</script>
</body>
</html>
