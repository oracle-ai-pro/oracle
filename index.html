<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Node 2.4 | Prestige HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10; --surface: #14151f; --border: #2d313e;
            --primary: #adc6ff; --primary-container: #254487;
            --on-surface: #e3e2e6; --on-surface-variant: #c7c6ca;
            --grad-start: #02b6ed; --grad-end: #e60ced;
        }
        body { margin: 0; background: var(--bg); color: var(--on-surface); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; }
        
        /* Квантовый поток (Анимация) */
        .quantum-stream { height: 3px; background: linear-gradient(90deg, var(--grad-start), var(--grad-end), var(--grad-start)); 
            background-size: 200% 100%; animation: flow 2s linear infinite; opacity: 0; }
        @keyframes flow { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .chat-area { display: flex; flex-direction: column; padding: 20px; }
        .input-box { display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); 
            padding: 10px; border-radius: 30px; background: var(--surface); transition: all 0.3s; }
        input { flex: 1; border: none; background: transparent; color: white; padding: 10px; font-size: 16px; outline: none; }
        
        .send-btn { width: 0; opacity: 0; transition: all 0.3s; border-radius: 50%; border: none; background: var(--primary); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; height: 40px; }
        .input-box.active .send-btn { width: 40px; opacity: 1; }
        
        .welcome { text-align: center; margin-top: 20vh; }
        .material-symbols-rounded { font-size: 24px; }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar"><h3>Core Node 2.4</h3></div>
    <div class="chat-area">
        <div id="welcome-msg" class="welcome"><h1 id="rand-text"></h1></div>
        <div id="chat-flow" style="flex-grow: 1;"></div>
        
        <div id="stream" class="quantum-stream"></div>
        <div class="input-box" id="box">
            <input type="text" id="user-input" placeholder="Введите команду..." oninput="check()">
            <button class="send-btn" onclick="send()"><span class="material-symbols-rounded">send</span></button>
        </div>
    </div>
</div>

<script>
    const phrases = ["Ядро готово. Какой план?", "Система 2.4 онлайн.", "Оракул настроен. Жду команду."];
    document.getElementById('rand-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];

    function check() {
        const inp = document.getElementById('user-input');
        const box = document.getElementById('box');
        box.classList.toggle('active', inp.value.replace(/[\s\u00A0]+/g, '').length > 0);
    }

    function send() {
        const inp = document.getElementById('user-input');
        const text = inp.value;
        if (!text.trim()) return;

        document.getElementById('welcome-msg').style.display = 'none';
        document.getElementById('stream').style.opacity = '1';

        // Эмуляция обработки команды
        if (text.toLowerCase().includes("скачай")) {
            setTimeout(() => {
                const msg = document.createElement('div');
                msg.innerHTML = `Архив готов: <button onclick="window.open('https://oracle-ai-pro.github.io/oracle/packs/Kosmo_Level_3_4.worldpack')">Скачать</button>`;
                document.getElementById('chat-flow').appendChild(msg);
                document.getElementById('stream').style.opacity = '0';
            }, 1500);
        }
        inp.value = ""; check();
    }
</script>
</body>
</html>
