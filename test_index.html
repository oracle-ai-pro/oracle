<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oracle AI 2.5 | Prestige HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <meta name="theme-color" content="#0a0b10">
    <style>
        :root {
            --bg: #0a0b10; --surface: #14151f; --surface-variant: #1f202e;
            --on-surface: #e3e2e6; --on-surface-variant: #c7c6ca;
            --primary: #adc6ff; --primary-container: #254487;
            --secondary: #e8bbf1; --grad: linear-gradient(90deg, #02b6ed 0%, #e60ced 100%);
            --glass-bg: rgba(31, 32, 46, 0.75);
        }
        body.light-theme { --bg: #f8f9ff; --surface: #f0f1f9; --surface-variant: #e1e2ec; --on-surface: #1a1b20; --primary: #3b5ba9; --primary-container: #d9e2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--on-surface); font-family: sans-serif; }
        .oracle-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .glass-nav { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: 24px; padding: 6px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; background: none; border: none; color: var(--on-surface-variant); cursor: pointer; padding: 8px; border-radius: 16px; }
        .nav-item.active { color: var(--primary); background: var(--primary-container); }
        .app-screen { display: none; flex-direction: column; flex-grow: 1; padding: 90px 20px 120px 20px; overflow-y: auto; }
        .app-screen.active-screen { display: flex; }
        .glass-input-box { position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 1000; display: flex; background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: 28px; padding: 8px 16px; align-items: flex-end; gap: 8px; }
        #user-input { flex: 1; background: none; border: none; color: var(--on-surface); outline: none; resize: none; max-height: 120px; padding: 10px 0; }
        .send-btn { background: var(--primary); color: var(--bg); border-radius: 50%; width: 38px; height: 38px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .msg { padding: 14px 18px; font-size: 14px; max-width: 80%; margin: 8px 0; }
        .ai-msg { background: var(--surface-variant); align-self: flex-start; border-radius: 4px 20px 20px 20px; }
        .user-msg { background: var(--grad); color: #fff; align-self: flex-end; border-radius: 20px 4px 20px 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="oracle-container">
    <nav class="glass-nav">
        <button class="nav-item active" id="btn-tab-chat" onclick="switchScreen('chat')"><span class="material-symbols-rounded">chat_bubble</span></button>
        <button class="nav-item" id="btn-tab-logs" onclick="switchScreen('logs')"><span class="material-symbols-rounded">database</span></button>
        <button class="nav-item" id="btn-tab-reader" onclick="switchScreen('reader')"><span class="material-symbols-rounded">auto_stories</span></button>
        <button class="nav-item" id="btn-tab-settings" onclick="switchScreen('settings')"><span class="material-symbols-rounded">settings_heart</span></button>
    </nav>

    <main id="screen-chat" class="app-screen active-screen">
        <div id="chat-flow" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </main>

    <main id="screen-logs" class="app-screen"><h2>Архив</h2></main>
    <main id="screen-reader" class="app-screen"><h2>Ридер</h2></main>
    <main id="screen-settings" class="app-screen">
        <button onclick="document.body.classList.toggle('light-theme')">Сменить тему</button>
    </main>

    <div class="glass-input-box" id="main-input-box">
        <textarea id="user-input" rows="1" placeholder="Запрос..."></textarea>
        <button id="voice-btn" class="icon-btn" onclick="startVoice()"><span class="material-symbols-rounded">mic</span></button>
        <button class="send-btn" onclick="sendMsg()"><span class="material-symbols-rounded">send</span></button>
    </div>
</div>

<script>
    // --- НАВИГАЦИЯ ---
    function switchScreen(screenName) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        document.getElementById(`screen-${screenName}`).classList.add('active-screen');
        document.getElementById(`btn-tab-${screenName}`).classList.add('active');
        document.getElementById('main-input-box').style.display = (screenName === 'chat') ? 'flex' : 'none';
    }

    // --- ЛОГИКА ОТПРАВКИ ---
    const input = document.getElementById('user-input');
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

    function sendMsg() {
        const msg = input.value.trim();
        if (!msg) return;
        
        document.getElementById('chat-flow').innerHTML += `<div class="msg user-msg">${msg}</div>`;
        input.value = "";
        
        // --- ОТВЕТ ОРАКУЛА (IF/ELSE) ---
        setTimeout(() => {
            let response = "Система приняла запрос.";
            const q = msg.toLowerCase();
            if (q.includes("привет")) response = "Приветствую, оператор.";
            else if (q.includes("как дела")) response = "Все узлы Prestige HQ работают стабильно.";
            else if (q.includes("кто ты")) response = "Oracle AI, твой персональный ассистент.";
            
            document.getElementById('chat-flow').innerHTML += `<div class="msg ai-msg">${response}</div>`;
            document.getElementById('screen-chat').scrollTop = 9999;
        }, 500);
    }

    // --- ГОЛОС ---
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'ru-RU';
    rec.onresult = (e) => { input.value = e.results[0][0].transcript; };
    function startVoice() { rec.start(); }
</script>
</body>
</html>
